<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RR Cafe Reviews</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    background: #fff8f0;
    color: #333;
}

/* Navbar Styles */
header{
display:flex;
align-items:center;
justify-content:space-between;
background:#556B2F; /* olive green */
padding:15px 30px;
position:sticky;
top:0;
}
header .logo {
    height: 50px;
}
nav a {
    color: #fff;
    text-decoration: none;
    margin-left: 20px;
    font-weight: 600;
    transition: color 0.3s;
}
nav a:hover {
    color: #ffe4d1;
}

/* Page Heading */
h1 {
    text-align: center;
    margin: 30px 0 10px;
}

/* Custom Reviews */
.review-section {
    padding: 20px;
}
.review {
    background: #fff;
    margin: 10px auto;
    padding: 15px 20px;
    max-width: 600px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    text-align: left;
    font-size: 1rem;
}
.review span.stars {
    color: gold;
}

/* Google Reviews Embed */
.google-reviews {
    margin: 30px auto;
    max-width: 600px;
}
iframe {
    width: 100%;
    height: 400px;
    border: none;
    border-radius: 8px;
}

/* Back Home Button */
.back-btn {
    display: inline-block;
    margin: 20px auto;
    padding: 10px 25px;
    background: #ff7f50;
    color: #fff;
    text-decoration: none;
    border-radius: 5px;
    transition: background 0.3s;
    text-align: center;
}
.back-btn:hover {
    background: #e56b3c;
}
</style>
</head>
<body>

<!-- Navbar -->
<header>
    <img src="IMG_3345.jpg" alt="RR Cafe Logo" class="logo">
    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="gallery.html">Gallery</a>
        <a href="reviews.html">Reviews</a>
    </nav>
</header>

<h1>Customer Reviews</h1>

<div class="review-section">
    <div class="review"><span class="stars">⭐⭐⭐⭐⭐</span> Amazing coffee!</div>
    <div class="review"><span class="stars">⭐⭐⭐⭐⭐</span> Best cafe in Rekawa.</div>
</div>

<h2 style="text-align:center;">Google Reviews</h2>
<div class="google-reviews">
    <iframe src="IMG_3386.jpg" allowfullscreen></iframe>
    <iframe src="IMG_3385.jpg" allowfullscreen></iframe>
    <iframe src="IMG_3383.jpg" allowfullscreen></iframe>
    <iframe src="IMG_33484.jpg" allowfullscreen></iframe>


</div>

<a href="index.html" class="back-btn">Back Home</a>

</body>
</html>
