<style>

margin:0;
background:#fff8f0;
}

/* NAVBAR */

header{
display:flex;
align-items:center;
justify-content:space-between;
background:#556B2F; /* olive green */
padding:15px 30px;
position:sticky;
top:0;
}

.logo{
height:50px;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:600;
}

nav a:hover{
color:#ffe4d1;
}

/* PAGE TITLE */

h1{
text-align:center;
margin-top:30px;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:30px;
}

.gallery img{
width:100%;
border-radius:10px;
transition:transform 0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* BACK BUTTON */

.back-btn{
display:block;
width:150px;
margin:20px auto;
padding:10px;
text-align:center;
background:#ff7f50;
color:white;
text-decoration:none;
border-radius:5px;
}

.back-btn:hover{
background:#e56b3c;
}

</style>
